name: ping
description: Send ICMP echo requests to a target host and report reachability and round-trip time.
version: "1.0"
inputs:
  - name: target
    type: string
    required: true
    description: IP address or hostname to ping
  - name: count
    type: integer
    required: false
    default: 4
    description: Number of echo requests to send
command: python main.py
timeout: 30
